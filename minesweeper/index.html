<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper</title>
  <style>
    :root {
      --bg-1: #f7f1e3;
      --bg-2: #c8d6e5;
      --panel: rgba(255, 255, 255, 0.75);
      --panel-border: rgba(34, 47, 62, 0.16);
      --text: #222f3e;
      --muted: #576574;
      --accent: #ff9f43;
      --danger: #ee5253;
      --cell-hidden: #dfe6e9;
      --cell-hidden-2: #c8d6e5;
      --cell-open: #f5f6fa;
      --cell-border: rgba(34, 47, 62, 0.16);
      --shadow: 0 18px 50px rgba(34, 47, 62, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 159, 67, 0.3), transparent 28%),
        radial-gradient(circle at bottom right, rgba(16, 172, 132, 0.2), transparent 32%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(100%, 820px);
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 28px 28px 12px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: end;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 42ch;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, auto);
      gap: 12px;
      align-items: center;
      padding: 16px 28px 0;
      flex-wrap: wrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(88px, 1fr));
      gap: 12px;
      padding: 20px 28px;
    }

    .stat,
    .select-wrap,
    .button {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      min-height: 56px;
    }

    .stat {
      padding: 10px 14px;
      display: grid;
      gap: 4px;
      align-content: center;
    }

    .label {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .value {
      font-size: 1.45rem;
      font-weight: 700;
    }

    .select-wrap {
      padding: 0 12px;
      display: flex;
      align-items: center;
    }

    select,
    button {
      font: inherit;
      color: inherit;
      border: 0;
      background: transparent;
      width: 100%;
      outline: none;
    }

    .button {
      padding: 0 16px;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.95);
    }

    .button.primary {
      background: linear-gradient(135deg, #ffbe76, var(--accent));
      color: #2d3436;
      font-weight: 700;
    }

    .status {
      padding: 0 28px 20px;
      color: var(--muted);
      min-height: 1.5em;
      font-weight: 600;
    }

    .board-shell {
      padding: 0 18px 18px;
      overflow: auto;
    }

    .board {
      --size: 10;
      --gap: 6px;
      --padding: 28px;
      --cell-size: min(44px, calc((min(100vw - 72px, 100%) - var(--padding) - ((var(--size) - 1) * var(--gap))) / var(--size)));
      display: grid;
      grid-template-columns: repeat(var(--size), var(--cell-size));
      gap: var(--gap);
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      padding: 14px;
      background: rgba(255, 255, 255, 0.45);
      border-radius: 22px;
      border: 1px solid var(--panel-border);
    }

    .cell {
      width: var(--cell-size);
      aspect-ratio: 1;
      border: 1px solid var(--cell-border);
      border-radius: 10px;
      background: linear-gradient(145deg, var(--cell-hidden), var(--cell-hidden-2));
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      cursor: pointer;
      user-select: none;
      transition: transform 100ms ease, background 120ms ease, box-shadow 120ms ease;
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.4);
    }

    .cell:hover {
      transform: translateY(-1px);
    }

    .cell.revealed {
      background: var(--cell-open);
      box-shadow: none;
      cursor: default;
    }

    .cell.flagged {
      color: var(--accent);
    }

    .cell.mine {
      background: linear-gradient(145deg, #ff7675, var(--danger));
      color: #fff;
    }

    .cell.exploded {
      background: linear-gradient(145deg, #2d3436, #000);
      color: #fff;
    }

    .n1 { color: #0984e3; }
    .n2 { color: #00b894; }
    .n3 { color: #d63031; }
    .n4 { color: #6c5ce7; }
    .n5 { color: #b33939; }
    .n6 { color: #0abde3; }
    .n7 { color: #2d3436; }
    .n8 { color: #636e72; }

    .footer {
      padding: 0 28px 24px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 720px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .board {
        --gap: 4px;
        --padding: 20px;
        --cell-size: min(36px, calc((min(100vw - 56px, 100%) - var(--padding) - ((var(--size) - 1) * var(--gap))) / var(--size)));
        gap: var(--gap);
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <h1>Minesweeper</h1>
        <p class="subtitle">Clear the field without detonating a mine. Left click to reveal. Right click to plant a flag.</p>
      </div>
    </section>

    <section class="controls">
      <label class="select-wrap" for="difficulty">
        <select id="difficulty" aria-label="Difficulty">
          <option value="beginner">Beginner 9x9, 10 mines</option>
          <option value="intermediate" selected>Intermediate 16x16, 40 mines</option>
          <option value="expert">Expert 20x20, 70 mines</option>
        </select>
      </label>
      <button id="new-game" class="button primary" type="button">New Game</button>
      <button id="toggle-flags" class="button" type="button">Flag Mode: Off</button>
      <button id="hint" class="button" type="button">Quick Reveal</button>
    </section>

    <section class="stats" aria-label="Game stats">
      <div class="stat">
        <span class="label">Mines Left</span>
        <span id="mines-left" class="value">0</span>
      </div>
      <div class="stat">
        <span class="label">Time</span>
        <span id="timer" class="value">0</span>
      </div>
      <div class="stat">
        <span class="label">Progress</span>
        <span id="progress" class="value">0%</span>
      </div>
    </section>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <section class="board-shell">
      <div id="board" class="board" aria-label="Minesweeper board"></div>
    </section>

    <p class="footer">Tip: on touchscreens, use Flag Mode to place markers before tapping cells.</p>
  </main>

  <script>
    const presets = {
      beginner: { rows: 9, cols: 9, mines: 10 },
      intermediate: { rows: 16, cols: 16, mines: 40 },
      expert: { rows: 20, cols: 20, mines: 70 }
    };

    const boardEl = document.getElementById("board");
    const difficultyEl = document.getElementById("difficulty");
    const newGameEl = document.getElementById("new-game");
    const toggleFlagsEl = document.getElementById("toggle-flags");
    const hintEl = document.getElementById("hint");
    const minesLeftEl = document.getElementById("mines-left");
    const timerEl = document.getElementById("timer");
    const progressEl = document.getElementById("progress");
    const statusEl = document.getElementById("status");

    let state = {};
    let timerId = null;

    function createGame(config) {
      stopTimer();
      state = {
        ...config,
        board: [],
        firstMove: true,
        revealedCount: 0,
        flaggedCount: 0,
        gameOver: false,
        win: false,
        elapsed: 0,
        flagMode: false
      };

      for (let row = 0; row < state.rows; row += 1) {
        const currentRow = [];
        for (let col = 0; col < state.cols; col += 1) {
          currentRow.push({
            row,
            col,
            mine: false,
            revealed: false,
            flagged: false,
            adjacent: 0
          });
        }
        state.board.push(currentRow);
      }

      boardEl.style.setProperty("--size", state.cols);
      timerEl.textContent = "0";
      statusEl.textContent = "Board ready.";
      renderBoard();
      updateStats();
    }

    function placeMines(safeRow, safeCol) {
      const cells = [];
      for (let row = 0; row < state.rows; row += 1) {
        for (let col = 0; col < state.cols; col += 1) {
          if (row === safeRow && col === safeCol) {
            continue;
          }
          cells.push({ row, col });
        }
      }

      for (let i = cells.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [cells[i], cells[j]] = [cells[j], cells[i]];
      }

      for (let i = 0; i < state.mines; i += 1) {
        const { row, col } = cells[i];
        state.board[row][col].mine = true;
      }

      for (let row = 0; row < state.rows; row += 1) {
        for (let col = 0; col < state.cols; col += 1) {
          state.board[row][col].adjacent = countAdjacentMines(row, col);
        }
      }
    }

    function countAdjacentMines(row, col) {
      let count = 0;
      for (let r = row - 1; r <= row + 1; r += 1) {
        for (let c = col - 1; c <= col + 1; c += 1) {
          if (r === row && c === col) {
            continue;
          }
          if (inBounds(r, c) && state.board[r][c].mine) {
            count += 1;
          }
        }
      }
      return count;
    }

    function inBounds(row, col) {
      return row >= 0 && col >= 0 && row < state.rows && col < state.cols;
    }

    function getNeighbors(row, col) {
      const neighbors = [];
      for (let r = row - 1; r <= row + 1; r += 1) {
        for (let c = col - 1; c <= col + 1; c += 1) {
          if ((r !== row || c !== col) && inBounds(r, c)) {
            neighbors.push(state.board[r][c]);
          }
        }
      }
      return neighbors;
    }

    function startTimer() {
      if (timerId) {
        return;
      }
      timerId = window.setInterval(() => {
        state.elapsed += 1;
        timerEl.textContent = String(state.elapsed);
      }, 1000);
    }

    function stopTimer() {
      if (timerId) {
        window.clearInterval(timerId);
        timerId = null;
      }
    }

    function revealCell(row, col) {
      const cell = state.board[row][col];
      if (state.gameOver || cell.revealed || cell.flagged) {
        return;
      }

      if (state.firstMove) {
        placeMines(row, col);
        state.firstMove = false;
        startTimer();
      }

      cell.revealed = true;
      state.revealedCount += 1;

      if (cell.mine) {
        cell.exploded = true;
        finishGame(false);
        return;
      }

      if (cell.adjacent === 0) {
        floodReveal(row, col);
      }

      checkWin();
      renderBoard();
      updateStats();
    }

    function floodReveal(row, col) {
      const stack = [[row, col]];
      while (stack.length) {
        const [currentRow, currentCol] = stack.pop();
        for (const neighbor of getNeighbors(currentRow, currentCol)) {
          if (neighbor.revealed || neighbor.flagged || neighbor.mine) {
            continue;
          }
          neighbor.revealed = true;
          state.revealedCount += 1;
          if (neighbor.adjacent === 0) {
            stack.push([neighbor.row, neighbor.col]);
          }
        }
      }
    }

    function toggleFlag(row, col) {
      const cell = state.board[row][col];
      if (state.gameOver || cell.revealed) {
        return;
      }
      cell.flagged = !cell.flagged;
      state.flaggedCount += cell.flagged ? 1 : -1;
      renderBoard();
      updateStats();
    }

    function chordCell(row, col) {
      const cell = state.board[row][col];
      if (!cell.revealed || cell.adjacent === 0 || state.gameOver) {
        return;
      }

      const neighbors = getNeighbors(row, col);
      const flaggedNeighbors = neighbors.filter((neighbor) => neighbor.flagged).length;
      if (flaggedNeighbors !== cell.adjacent) {
        return;
      }

      for (const neighbor of neighbors) {
        if (!neighbor.flagged && !neighbor.revealed) {
          revealCell(neighbor.row, neighbor.col);
        }
      }
    }

    function quickReveal() {
      if (state.gameOver) {
        return;
      }

      for (let row = 0; row < state.rows; row += 1) {
        for (let col = 0; col < state.cols; col += 1) {
          const cell = state.board[row][col];
          if (!cell.revealed && !cell.flagged) {
            revealCell(row, col);
            statusEl.textContent = "Quick reveal opened one cell.";
            return;
          }
        }
      }
    }

    function finishGame(win) {
      state.gameOver = true;
      state.win = win;
      stopTimer();

      for (let row = 0; row < state.rows; row += 1) {
        for (let col = 0; col < state.cols; col += 1) {
          const cell = state.board[row][col];
          if (cell.mine) {
            cell.revealed = true;
          }
        }
      }

      statusEl.textContent = win ? "You cleared the board." : "Boom. Try again.";
      renderBoard();
      updateStats();
    }

    function checkWin() {
      const safeCells = state.rows * state.cols - state.mines;
      if (state.revealedCount >= safeCells) {
        finishGame(true);
      }
    }

    function updateStats() {
      const minesLeft = Math.max(state.mines - state.flaggedCount, 0);
      const safeCells = state.rows * state.cols - state.mines;
      const progress = safeCells === 0 ? 0 : Math.round((state.revealedCount / safeCells) * 100);
      minesLeftEl.textContent = String(minesLeft);
      progressEl.textContent = progress + "%";
      toggleFlagsEl.textContent = "Flag Mode: " + (state.flagMode ? "On" : "Off");
    }

    function renderBoard() {
      boardEl.innerHTML = "";
      for (let row = 0; row < state.rows; row += 1) {
        for (let col = 0; col < state.cols; col += 1) {
          const cell = state.board[row][col];
          const button = document.createElement("button");
          button.type = "button";
          button.className = "cell";
          button.dataset.row = String(row);
          button.dataset.col = String(col);

          if (cell.revealed) {
            button.classList.add("revealed");
            if (cell.mine) {
              button.classList.add(cell.exploded ? "exploded" : "mine");
              button.textContent = "*";
            } else if (cell.adjacent > 0) {
              button.classList.add("n" + cell.adjacent);
              button.textContent = String(cell.adjacent);
            }
          } else if (cell.flagged) {
            button.classList.add("flagged");
            button.textContent = "\u2691";
          }

          button.setAttribute("aria-label", "Row " + (row + 1) + ", Column " + (col + 1));
          boardEl.appendChild(button);
        }
      }
    }

    boardEl.addEventListener("click", (event) => {
      const target = event.target.closest(".cell");
      if (!target) {
        return;
      }
      const row = Number(target.dataset.row);
      const col = Number(target.dataset.col);
      const cell = state.board[row][col];

      if (state.flagMode) {
        toggleFlag(row, col);
      } else if (cell.revealed) {
        chordCell(row, col);
      } else {
        revealCell(row, col);
      }
    });

    boardEl.addEventListener("contextmenu", (event) => {
      const target = event.target.closest(".cell");
      if (!target) {
        return;
      }
      event.preventDefault();
      toggleFlag(Number(target.dataset.row), Number(target.dataset.col));
    });

    newGameEl.addEventListener("click", () => {
      createGame(presets[difficultyEl.value]);
    });

    difficultyEl.addEventListener("change", () => {
      createGame(presets[difficultyEl.value]);
    });

    toggleFlagsEl.addEventListener("click", () => {
      state.flagMode = !state.flagMode;
      updateStats();
      statusEl.textContent = state.flagMode ? "Flag mode enabled." : "Flag mode disabled.";
    });

    hintEl.addEventListener("click", quickReveal);

    createGame(presets[difficultyEl.value]);
  </script>
</body>
</html>
